server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/train_booking
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.trainbooking.kafka"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

traffic-control:
  layer1:
    capacity: 10
    refill-tokens: 5
    refill-seconds: 60
  queue:
    releases-per-second: 200
    max-queue-size: 100000
    avg-service-seconds: 1
    scheduler-ms: 1000
  adaptive:
    min-limit: 100
    max-limit: 2500
    increase-by: 20
    decrease-factor: 0.7
    high-latency-ms: 300
